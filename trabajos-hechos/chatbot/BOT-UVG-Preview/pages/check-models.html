<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos Gratuitos - OpenRouter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .model-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .model-card:hover {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }

        .model-card.free {
            border-color: #10b981;
            background: #f0fdf4;
        }

        .model-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .model-name {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .model-id {
            font-size: 12px;
            color: #64748b;
            font-family: monospace;
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-free {
            background: #dcfce7;
            color: #15803d;
        }

        .badge-paid {
            background: #fee2e2;
            color: #991b1b;
        }

        .model-description {
            color: #475569;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .model-pricing {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }

        .price-item {
            flex: 1;
        }

        .price-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .price-value {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }

        .price-value.free {
            color: #15803d;
        }

        .model-context {
            font-size: 12px;
            color: #64748b;
            margin-top: 8px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 14px;
            color: #64748b;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #dc2626;
        }

        .copy-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }

        .copy-btn:hover {
            background: #2563eb;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .filter-btn:hover {
            border-color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Modelos Disponibles en OpenRouter</h1>
        <p class="subtitle">Consultando modelos gratuitos con tu API key...</p>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Cargando modelos desde OpenRouter...</p>
        </div>

        <div id="stats" style="display: none;"></div>

        <div id="filters" style="display: none;" class="filter-buttons">
            <button class="filter-btn active" onclick="filterModels('all')">Todos</button>
            <button class="filter-btn" onclick="filterModels('free')">Solo Gratuitos</button>
            <button class="filter-btn" onclick="filterModels('paid')">De Pago</button>
        </div>

        <div id="error" style="display: none;"></div>
        <div id="models" class="models-grid"></div>
    </div>

    <script>
        const API_KEY = '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';
        let allModels = [];
        let currentFilter = 'all';

        async function fetchModels() {
            try {
                const response = await fetch('https://openrouter.ai/api/v1/models', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                allModels = data.data || [];

                document.getElementById('loading').style.display = 'none';

                if (allModels.length === 0) {
                    showError('No se encontraron modelos disponibles.');
                    return;
                }

                displayStats();
                displayModels();
                document.getElementById('filters').style.display = 'flex';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').style.display = 'none';
                showError(`Error al cargar modelos: ${error.message}`);
            }
        }

        function displayStats() {
            const freeModels = allModels.filter(m => isFreeModel(m));
            const paidModels = allModels.filter(m => !isFreeModel(m));

            const statsHTML = `
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value">${allModels.length}</div>
                        <div class="stat-label">Total de Modelos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #15803d;">${freeModels.length}</div>
                        <div class="stat-label">Modelos Gratuitos</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #991b1b;">${paidModels.length}</div>
                        <div class="stat-label">Modelos de Pago</div>
                    </div>
                </div>
            `;

            document.getElementById('stats').innerHTML = statsHTML;
            document.getElementById('stats').style.display = 'block';
        }

        function isFreeModel(model) {
            const pricing = model.pricing || {};
            const promptPrice = parseFloat(pricing.prompt) || 0;
            const completionPrice = parseFloat(pricing.completion) || 0;
            return promptPrice === 0 && completionPrice === 0;
        }

        function filterModels(filter) {
            currentFilter = filter;

            // Update button states
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            displayModels();
        }

        function displayModels() {
            let modelsToShow = allModels;

            if (currentFilter === 'free') {
                modelsToShow = allModels.filter(m => isFreeModel(m));
            } else if (currentFilter === 'paid') {
                modelsToShow = allModels.filter(m => !isFreeModel(m));
            }

            if (modelsToShow.length === 0) {
                document.getElementById('models').innerHTML = '<p style="text-align: center; color: #64748b; padding: 40px;">No hay modelos en esta categoría.</p>';
                return;
            }

            const modelsHTML = modelsToShow.map(model => {
                const isFree = isFreeModel(model);
                const pricing = model.pricing || {};
                const promptPrice = parseFloat(pricing.prompt) || 0;
                const completionPrice = parseFloat(pricing.completion) || 0;
                const contextLength = model.context_length || 'N/A';

                return `
                    <div class="model-card ${isFree ? 'free' : ''}">
                        <div class="model-header">
                            <div>
                                <div class="model-name">${model.name || model.id}</div>
                                <div class="model-id">${model.id}</div>
                            </div>
                            <span class="badge ${isFree ? 'badge-free' : 'badge-paid'}">
                                ${isFree ? '✓ Gratis' : '💰 Pago'}
                            </span>
                        </div>

                        ${model.description ? `<div class="model-description">${model.description}</div>` : ''}

                        <div class="model-pricing">
                            <div class="price-item">
                                <div class="price-label">Prompt</div>
                                <div class="price-value ${isFree ? 'free' : ''}">
                                    ${isFree ? 'Gratis' : `$${promptPrice}`}
                                </div>
                            </div>
                            <div class="price-item">
                                <div class="price-label">Completion</div>
                                <div class="price-value ${isFree ? 'free' : ''}">
                                    ${isFree ? 'Gratis' : `$${completionPrice}`}
                                </div>
                            </div>
                        </div>

                        <div class="model-context">
                            📝 Context: ${contextLength.toLocaleString()} tokens
                        </div>

                        <button class="copy-btn" onclick="copyModelId('${model.id}')">
                            📋 Copiar ID
                        </button>
                    </div>
                `;
            }).join('');

            document.getElementById('models').innerHTML = modelsHTML;
        }

        function copyModelId(modelId) {
            navigator.clipboard.writeText(modelId).then(() => {
                alert(`✓ Copiado: ${modelId}`);
            });
        }

        function showError(message) {
            document.getElementById('error').innerHTML = `
                <div class="error">
                    <strong>Error:</strong> ${message}
                </div>
            `;
            document.getElementById('error').style.display = 'block';
        }

        // Cargar modelos al iniciar
        fetchModels();
    </script>
</body>
</html>
